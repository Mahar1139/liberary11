openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: School Library Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: schools
    description: School management
  - name: profiles
    description: User profile management
  - name: books
    description: Book catalog management
  - name: students
    description: Student management
  - name: issues
    description: Book issue and return management
  - name: dashboard
    description: Dashboard statistics and summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── SCHOOLS ──────────────────────────────────────────────────────────────
  /schools:
    get:
      operationId: listSchools
      tags: [schools]
      summary: List all schools
      responses:
        "200":
          description: List of schools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/School"
    post:
      operationId: createSchool
      tags: [schools]
      summary: Create a new school
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSchoolBody"
      responses:
        "201":
          description: School created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/School"

  /schools/{id}:
    get:
      operationId: getSchool
      tags: [schools]
      summary: Get a school by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: School details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/School"
    put:
      operationId: updateSchool
      tags: [schools]
      summary: Update a school
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSchoolBody"
      responses:
        "200":
          description: School updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/School"
    delete:
      operationId: deleteSchool
      tags: [schools]
      summary: Delete a school
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── PROFILES ─────────────────────────────────────────────────────────────
  /profiles/me:
    get:
      operationId: getMyProfile
      tags: [profiles]
      summary: Get current user's profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profiles/me/setup:
    post:
      operationId: setupProfile
      tags: [profiles]
      summary: Create or update current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupProfileBody"
      responses:
        "200":
          description: Profile set up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profiles:
    get:
      operationId: listProfiles
      tags: [profiles]
      summary: List all profiles (super admin only)
      responses:
        "200":
          description: List of profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfileWithSchool"

  /profiles/{id}:
    put:
      operationId: updateProfile
      tags: [profiles]
      summary: Update a profile (super admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    delete:
      operationId: deleteProfile
      tags: [profiles]
      summary: Delete a profile (super admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── BOOKS ─────────────────────────────────────────────────────────────────
  /books:
    get:
      operationId: listBooks
      tags: [books]
      summary: List books (filtered by school for librarians)
      parameters:
        - name: schoolId
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
    post:
      operationId: createBook
      tags: [books]
      summary: Add a new book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookBody"
      responses:
        "201":
          description: Book created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"

  /books/{id}:
    get:
      operationId: getBook
      tags: [books]
      summary: Get a book by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Book details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
    put:
      operationId: updateBook
      tags: [books]
      summary: Update a book
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookBody"
      responses:
        "200":
          description: Book updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
    delete:
      operationId: deleteBook
      tags: [books]
      summary: Delete a book
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── STUDENTS ──────────────────────────────────────────────────────────────
  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List students (filtered by school for librarians)
      parameters:
        - name: schoolId
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Add a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentBody"
      responses:
        "201":
          description: Student created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get a student by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Student details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
    put:
      operationId: updateStudent
      tags: [students]
      summary: Update a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentBody"
      responses:
        "200":
          description: Student updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Delete a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /students/{id}/history:
    get:
      operationId: getStudentBorrowHistory
      tags: [students]
      summary: Get borrow history for a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Student borrow history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IssueRecord"

  # ─── ISSUES ────────────────────────────────────────────────────────────────
  /issues:
    get:
      operationId: listIssues
      tags: [issues]
      summary: List issue records (filtered by school for librarians)
      parameters:
        - name: schoolId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [issued, returned, overdue]
        - name: studentId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of issue records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IssueRecord"
    post:
      operationId: issueBook
      tags: [issues]
      summary: Issue a book to a student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueBookBody"
      responses:
        "201":
          description: Book issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueRecord"

  /issues/{id}/return:
    post:
      operationId: returnBook
      tags: [issues]
      summary: Return a book and calculate fine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Book returned with fine info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueRecord"

  /issues/{id}:
    delete:
      operationId: deleteIssue
      tags: [issues]
      summary: Delete an issue record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # ─── DASHBOARD ─────────────────────────────────────────────────────────────
  /dashboard/super-admin:
    get:
      operationId: getSuperAdminDashboard
      tags: [dashboard]
      summary: Super admin global dashboard stats
      responses:
        "200":
          description: Super admin dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuperAdminDashboard"

  /dashboard/librarian:
    get:
      operationId: getLibrarianDashboard
      tags: [dashboard]
      summary: Librarian dashboard stats for their school
      responses:
        "200":
          description: Librarian dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibrarianDashboard"

  /dashboard/school-stats:
    get:
      operationId: getSchoolStats
      tags: [dashboard]
      summary: Per-school stats comparison (super admin)
      responses:
        "200":
          description: Stats per school
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SchoolStats"

  /dashboard/overdue:
    get:
      operationId: getOverdueBooks
      tags: [dashboard]
      summary: List all overdue books with fine amounts
      parameters:
        - name: schoolId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Overdue book records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IssueRecord"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent issue/return activity feed
      parameters:
        - name: schoolId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent activity records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IssueRecord"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    School:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        address:
          type: string
        contactEmail:
          type: string
        createdAt:
          type: string
      required: [id, name, address, contactEmail, createdAt]

    CreateSchoolBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        contactEmail:
          type: string
      required: [name, address, contactEmail]

    Profile:
      type: object
      properties:
        id:
          type: string
        clerkUserId:
          type: string
        role:
          type: string
          enum: [super_admin, librarian_head]
        schoolId:
          type: string
          nullable: true
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
      required: [id, clerkUserId, role, fullName, phone, email]

    ProfileWithSchool:
      type: object
      properties:
        id:
          type: string
        clerkUserId:
          type: string
        role:
          type: string
          enum: [super_admin, librarian_head]
        schoolId:
          type: string
          nullable: true
        schoolName:
          type: string
          nullable: true
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
      required: [id, clerkUserId, role, fullName, phone, email]

    SetupProfileBody:
      type: object
      properties:
        role:
          type: string
          enum: [super_admin, librarian_head]
        schoolId:
          type: string
          nullable: true
        fullName:
          type: string
        phone:
          type: string
        email:
          type: string
      required: [role, fullName, phone, email]

    UpdateProfileBody:
      type: object
      properties:
        role:
          type: string
          enum: [super_admin, librarian_head]
        schoolId:
          type: string
          nullable: true
        fullName:
          type: string
        phone:
          type: string
      required: [role, fullName, phone]

    Book:
      type: object
      properties:
        id:
          type: string
        schoolId:
          type: string
        title:
          type: string
        author:
          type: string
        isbn:
          type: string
        category:
          type: string
        totalCopies:
          type: integer
        availableCopies:
          type: integer
        coverImageUrl:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, schoolId, title, author, isbn, category, totalCopies, availableCopies, createdAt]

    CreateBookBody:
      type: object
      properties:
        schoolId:
          type: string
        title:
          type: string
        author:
          type: string
        isbn:
          type: string
        category:
          type: string
        totalCopies:
          type: integer
        availableCopies:
          type: integer
        coverImageUrl:
          type: string
          nullable: true
      required: [schoolId, title, author, isbn, category, totalCopies, availableCopies]

    Student:
      type: object
      properties:
        id:
          type: string
        schoolId:
          type: string
        name:
          type: string
        rollNumber:
          type: string
        class:
          type: string
        section:
          type: string
        contactPhone:
          type: string
      required: [id, schoolId, name, rollNumber, class, section, contactPhone]

    CreateStudentBody:
      type: object
      properties:
        schoolId:
          type: string
        name:
          type: string
        rollNumber:
          type: string
        class:
          type: string
        section:
          type: string
        contactPhone:
          type: string
      required: [schoolId, name, rollNumber, class, section, contactPhone]

    IssueRecord:
      type: object
      properties:
        id:
          type: string
        schoolId:
          type: string
        bookId:
          type: string
        studentId:
          type: string
        issuedBy:
          type: string
        issueDate:
          type: string
        dueDate:
          type: string
        returnDate:
          type: string
          nullable: true
        fineAmount:
          type: number
        status:
          type: string
          enum: [issued, returned, overdue]
        bookTitle:
          type: string
        bookAuthor:
          type: string
        studentName:
          type: string
        studentRollNumber:
          type: string
        studentClass:
          type: string
        studentSection:
          type: string
      required: [id, schoolId, bookId, studentId, issuedBy, issueDate, dueDate, fineAmount, status, bookTitle, bookAuthor, studentName, studentRollNumber, studentClass, studentSection]

    IssueBookBody:
      type: object
      properties:
        schoolId:
          type: string
        bookId:
          type: string
        studentId:
          type: string
        dueDate:
          type: string
      required: [schoolId, bookId, studentId, dueDate]

    SuperAdminDashboard:
      type: object
      properties:
        totalSchools:
          type: integer
        totalBooks:
          type: integer
        totalStudents:
          type: integer
        activeIssues:
          type: integer
        overdueBooks:
          type: integer
        totalFinesCollected:
          type: number
        totalLibrarians:
          type: integer
      required: [totalSchools, totalBooks, totalStudents, activeIssues, overdueBooks, totalFinesCollected, totalLibrarians]

    LibrarianDashboard:
      type: object
      properties:
        schoolName:
          type: string
        totalBooks:
          type: integer
        availableBooks:
          type: integer
        issuedToday:
          type: integer
        overdueCount:
          type: integer
        finesCollected:
          type: number
        totalStudents:
          type: integer
        returnedToday:
          type: integer
      required: [schoolName, totalBooks, availableBooks, issuedToday, overdueCount, finesCollected, totalStudents, returnedToday]

    SchoolStats:
      type: object
      properties:
        schoolId:
          type: string
        schoolName:
          type: string
        totalBooks:
          type: integer
        totalStudents:
          type: integer
        activeIssues:
          type: integer
        overdueCount:
          type: integer
        finesCollected:
          type: number
      required: [schoolId, schoolName, totalBooks, totalStudents, activeIssues, overdueCount, finesCollected]
